<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Telemetry</title>
</head>
<body>
  <header id="status-bar">
    <span class="title">TELEMETRY</span>
    <div class="status-group">
      <span class="stat">hdg <b id="stat-heading">--</b></span>
      <span class="stat">seq <b id="stat-seq">0</b></span>
      <span class="stat">rate <b id="stat-rate">--</b></span>
      <span id="connection-status" class="disconnected">DISCONNECTED</span>
      <a href="/debug.html" id="debug-link">DEBUG</a>
    </div>
  </header>
  <main id="dashboard">
    <div id="chart-speed" class="chart-panel"></div>
    <div id="map-overview" class="chart-panel"></div>
    <div id="gcircle" class="chart-panel small"></div>
    <div id="map-follow" class="chart-panel small"></div>
    <div id="diagnostics" class="chart-panel small"></div>
  </main>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
