<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TELEMETRY DEBUG</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0a0a;
      --panel-bg: #0d0d12;
      --border: rgba(255, 107, 53, 0.12);
      --border-bright: rgba(255, 107, 53, 0.3);
      --accent: #ff6b35;
      --accent-dim: rgba(255, 107, 53, 0.5);
      --red: #e74c3c;
      --green: #2ecc71;
      --amber: #d4a017;
      --text: #c8bfa0;
      --text-bright: #f0e6d0;
      --text-dim: rgba(200, 191, 160, 0.35);
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: "SF Mono", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 13px;
      padding: 16px;
    }
    /* scan lines */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.06) 2px,
        rgba(0, 0, 0, 0.06) 4px
      );
    }
    h1 {
      font-size: 13px;
      letter-spacing: 3px;
      color: var(--accent);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      text-shadow: 0 0 8px rgba(255, 107, 53, 0.15);
    }
    h1 .jp { font-size: 9px; color: var(--text-dim); letter-spacing: 2px; }
    #status {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--red);
    }
    #status.live { color: var(--green); }
    #nuke-btn {
      background: transparent;
      border: 1px solid var(--red);
      color: var(--red);
      font-family: inherit;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 2px;
      padding: 3px 10px;
      cursor: pointer;
      text-transform: uppercase;
    }
    #nuke-btn:hover { background: var(--red); color: #fff; }
    #back-link {
      color: rgba(255, 107, 53, 0.3);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 2px;
      text-decoration: none;
      border: 1px solid rgba(255, 107, 53, 0.15);
      padding: 3px 10px;
    }
    #back-link:hover { color: var(--accent); border-color: var(--accent-dim); }
    #cam-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      background: var(--panel-bg);
      border: 1px solid var(--border);
      padding: 8px 14px;
      width: fit-content;
    }
    .cam-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--accent-dim);
    }
    #cam-controls button {
      background: transparent;
      border: 1px solid var(--border-bright);
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      width: 28px;
      height: 28px;
      cursor: pointer;
    }
    #cam-controls button:hover { background: rgba(255, 107, 53, 0.1); }
    #exp-val {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-bright);
      min-width: 120px;
      text-align: center;
    }
    #debug-controls {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    #latency-panel {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--panel-bg);
      border: 1px solid var(--border);
      padding: 8px 14px;
    }
    #last-update {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-bright);
      min-width: 60px;
    }
    #latency-val {
      font-size: 12px;
      font-weight: 700;
      color: var(--green);
      min-width: 50px;
    }
    #latency-canvas {
      height: 30px;
      width: 200px;
    }
    #channels {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 4px;
    }
    .ch {
      background: var(--panel-bg);
      border: 1px solid var(--border);
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      position: relative;
    }
    /* corner bracket decoration */
    .ch::before {
      content: "";
      position: absolute;
      top: 0; left: 0;
      width: 10px; height: 10px;
      border-top: 1px solid var(--accent-dim);
      border-left: 1px solid var(--accent-dim);
      pointer-events: none;
    }
    .ch::after {
      content: "";
      position: absolute;
      bottom: 0; right: 0;
      width: 10px; height: 10px;
      border-bottom: 1px solid var(--accent-dim);
      border-right: 1px solid var(--accent-dim);
      pointer-events: none;
    }
    .ch-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .ch-name {
      font-size: 9px;
      font-weight: 700;
      color: var(--accent-dim);
      letter-spacing: 2px;
    }
    .ch-value {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-bright);
    }
    .ch-canvas {
      width: 100%;
      height: 40px;
    }
  </style>
</head>
<body>
  <h1>
    TELEMETRY DEBUG <span class="jp">デバッグ端末</span>
    <span id="status">DISCONNECTED</span>
    <button id="nuke-btn">NUKE</button>
    <a href="/" id="back-link">DASHBOARD</a>
  </h1>
  <div id="debug-controls">
    <div id="cam-controls">
      <span class="cam-label">CAM EXPOSURE</span>
      <button id="exp-down">-</button>
      <span id="exp-val">--</span>
      <button id="exp-up">+</button>
    </div>
    <div id="latency-panel">
      <span class="cam-label">LAST UPDATE</span>
      <span id="last-update">--</span>
      <span class="cam-label" style="margin-left:16px">LATENCY</span>
      <span id="latency-val">--</span>
      <canvas id="latency-canvas" width="200" height="30"></canvas>
    </div>
  </div>
  <div id="channels"></div>
  <script type="module">
    const REMOTE_URL = (import.meta.env.VITE_SERVER_URL ?? "http://gearados-nx.tail62d295.ts.net:4400").replace(/\/$/, "");
    const isLocal = new URLSearchParams(window.location.search).has("local");
    const SERVER_URL = isLocal ? "http://localhost:4400" : REMOTE_URL;
    const MAX_PTS = 200;
    const container = document.getElementById("channels");
    const statusEl = document.getElementById("status");

    const channels = new Map();

    // Latency tracking
    const lastUpdateEl = document.getElementById("last-update");
    const latencyValEl = document.getElementById("latency-val");
    const latencyCanvas = document.getElementById("latency-canvas");
    const latencyCtx = latencyCanvas.getContext("2d");
    const LATENCY_WINDOW_MS = 60_000;
    const latencyHistory = []; // [{t, ms}]
    let lastEntryTime = 0;
    let lastPacketTime = 0;

    function updateLatencyDisplay() {
      const now = Date.now();
      const latencyMs = lastPacketTime ? now - lastPacketTime : 0;
      lastEntryTime = now;
      lastPacketTime = now;
      latencyHistory.push({ t: now, ms: latencyMs });
      const cutoff = now - LATENCY_WINDOW_MS;
      while (latencyHistory.length > 0 && latencyHistory[0].t < cutoff) latencyHistory.shift();
      const recent = latencyHistory.slice(-10);
      const avgMs = recent.length > 0 ? Math.round(recent.reduce((s, p) => s + p.ms, 0) / recent.length) : latencyMs;
      latencyValEl.textContent = `${avgMs}ms`;
      latencyValEl.style.color = avgMs < 200 ? "#2ecc71" : avgMs < 1000 ? "#d4a017" : "#e74c3c";
      drawLatencyChart();
    }

    function drawLatencyChart() {
      const dpr = window.devicePixelRatio || 1;
      const w = latencyCanvas.clientWidth;
      const h = latencyCanvas.clientHeight;
      latencyCanvas.width = w * dpr;
      latencyCanvas.height = h * dpr;
      latencyCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
      latencyCtx.clearRect(0, 0, w, h);
      if (latencyHistory.length < 2) return;

      const vals = latencyHistory.map(p => p.ms);
      const max = Math.max(...vals, 100);
      latencyCtx.beginPath();
      for (let i = 0; i < vals.length; i++) {
        const x = (i / (vals.length - 1)) * w;
        const y = h - (vals[i] / max) * h;
        if (i === 0) latencyCtx.moveTo(x, y);
        else latencyCtx.lineTo(x, y);
      }
      latencyCtx.strokeStyle = "rgba(255, 107, 53, 0.6)";
      latencyCtx.lineWidth = 1.5;
      latencyCtx.stroke();
    }

    // Update "last update" age every 100ms
    setInterval(() => {
      if (!lastEntryTime) return;
      const ago = ((Date.now() - lastEntryTime) / 1000).toFixed(1);
      lastUpdateEl.textContent = `${ago}s ago`;
    }, 100);

    function getOrCreate(name) {
      if (channels.has(name)) return channels.get(name);

      const el = document.createElement("div");
      el.className = "ch";
      el.innerHTML = `
        <div class="ch-header">
          <span class="ch-name">${name}</span>
          <span class="ch-value">--</span>
        </div>
        <canvas class="ch-canvas"></canvas>
      `;
      container.appendChild(el);

      const canvas = el.querySelector("canvas");
      const ctx = canvas.getContext("2d");
      const ch = {
        el,
        valueEl: el.querySelector(".ch-value"),
        canvas,
        ctx,
        values: [],
        recent: [], // [{t, v}] for smoothing
      };
      channels.set(name, ch);
      return ch;
    }

    function drawSparkline(ch) {
      const { canvas, ctx, values } = ch;
      const dpr = window.devicePixelRatio || 1;
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      canvas.width = w * dpr;
      canvas.height = h * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.clearRect(0, 0, w, h);

      if (values.length < 2) return;

      let min = Infinity, max = -Infinity;
      for (const v of values) {
        if (v < min) min = v;
        if (v > max) max = v;
      }
      const range = max - min || 1;
      const pad = range * 0.1;

      ctx.beginPath();
      for (let i = 0; i < values.length; i++) {
        const x = (i / (values.length - 1)) * w;
        const y = h - ((values[i] - min + pad) / (range + pad * 2)) * h;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.strokeStyle = "rgba(255, 107, 53, 0.5)";
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }

    function connect() {
      statusEl.textContent = "CONNECTING";
      statusEl.className = "";

      const es = new EventSource(`${SERVER_URL}/stream?history=false`);

      es.addEventListener("entry", (e) => {
        const { channel, value, ts } = JSON.parse(e.data);
        if (typeof value !== "number") return;

        const ch = getOrCreate(channel);
        ch.values.push(value);
        if (ch.values.length > MAX_PTS) ch.values.shift();
        const now = Date.now();
        ch.recent.push({ t: now, v: value });
        const cutoff = now - 250;
        while (ch.recent.length > 0 && ch.recent[0].t < cutoff) ch.recent.shift();
        const avg = ch.recent.reduce((s, p) => s + p.v, 0) / ch.recent.length;
        ch.valueEl.textContent = avg.toFixed(3);
        drawSparkline(ch);
        updateLatencyDisplay();
      });

      es.addEventListener("caught_up", () => {
        statusEl.textContent = "LIVE";
        statusEl.className = "live";
      });

      es.onerror = () => {
        es.close();
        statusEl.textContent = "DISCONNECTED";
        statusEl.className = "";
        setTimeout(connect, 2000);
      };
    }

    // Camera exposure controls
    const expVal = document.getElementById("exp-val");
    async function camExposure(action) {
      try {
        const url = action
          ? `${SERVER_URL}/cam/exposure/${action}`
          : `${SERVER_URL}/cam/exposure`;
        const res = await fetch(url, { method: action ? "POST" : "GET" });
        const data = await res.json();
        if (data.exposure_absolute != null) {
          expVal.textContent = `exp:${data.exposure_absolute} gain:${data.gain}`;
        }
      } catch {}
    }
    document.getElementById("exp-up").addEventListener("click", () => camExposure("up"));
    document.getElementById("exp-down").addEventListener("click", () => camExposure("down"));
    camExposure(null); // fetch initial values

    document.getElementById("nuke-btn").addEventListener("click", async () => {
      if (!confirm("Clear all telemetry data on the server?")) return;
      try {
        await fetch(`${SERVER_URL}/nuke`, { method: "POST" });
        window.location.reload();
      } catch (err) {
        console.error("nuke failed:", err.message);
      }
    });

    connect();
  </script>
</body>
</html>
